name: CI

on:
  push:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - '*'

jobs:
  tests_windows:
    runs-on: windows-2022
    strategy:
      matrix:
        python-version:
          - "3.11"

    steps:
    - uses: actions/checkout@v6

    - name: Install uv
      uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57
      with:
        enable-cache: true
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        uv venv
        uv pip install -r docs/requirements.txt
        uv pip install pytest pytest-datadir pandas openpyxl

    - name: Run tests
      run: |
        .venv\Scripts\pytest docs/ -v --ignore=docs/source/dae/ies

  tests_macos:
    runs-on: macos-latest
    strategy:
      matrix:
        python-version:
          - "3.11"

    steps:
    - uses: actions/checkout@v6

    - name: Install IPOPT
      run: |
        brew install ipopt

    - name: Install uv
      uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57
      with:
        enable-cache: true
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        uv venv
        uv pip install -r docs/requirements.txt
        uv pip install pytest pytest-datadir pandas openpyxl

    - name: Run tests
      run: |
        .venv/bin/pytest docs/source/dae/ies -v
